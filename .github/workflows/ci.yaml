name: Pipeline de Integracion Continua

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Descargar el código (Checkout)
      uses: actions/checkout@v3

    - name: 2. Configurar el entorno Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: 3. Instalar dependencias
      run: |
        pip install -r requirements.txt

    - name: 4. Ejecutar pruebas automáticas
      run: |
        pytest test_app.py

    - name: 5. Build automatizada (Docker)
      run: |
        docker build -t mi-app-demo .