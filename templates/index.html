<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimoog v4 Preset Generator</title>
    <style>
        body {
            background-color: #222;
            background-image: linear-gradient(#111 2px, transparent 2px), linear-gradient(90deg, #111 2px, transparent 2px);
            background-size: 30px 30px;
            color: #eee;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .synth-panel {
            background-color: #1a1a1a;
            border: 12px solid #5c3a21; /* Borde de madera */
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 90%;
        }
        h1 {
            color: #d4af37; /* Dorado clásico */
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
            margin-top: 0;
        }
        .screen {
            background-color: #0a110a;
            border: 4px solid #000;
            border-radius: 5px;
            padding: 20px;
            margin: 25px 0;
            box-shadow: inset 0 0 10px #000;
        }
        .screen h2 {
            color: #55ff55;
            margin: 0 0 15px 0;
            font-size: 1.5rem;
        }
        .parameter {
            margin-bottom: 10px;
            color: #88ff88;
            font-size: 1.1rem;
        }
        .label {
            color: #55aa55;
            font-weight: bold;
            display: inline-block;
            width: 140px;
        }
        .note {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px dashed #224422;
            color: #66cc66;
            font-style: italic;
            font-size: 0.9rem;
        }
        .button-container {
            text-align: center;
        }
        button {
            background-color: #d4af37;
            color: #111;
            border: 2px solid #8e7322;
            padding: 12px 25px;
            font-size: 1.2rem;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            box-shadow: 0 4px 0 #8e7322, 0 5px 10px rgba(0,0,0,0.5);
            transition: all 0.1s;
        }
        button:active {
            box-shadow: 0 0 0 #8e7322, 0 2px 5px rgba(0,0,0,0.5);
            transform: translateY(4px);
        }
    </style>
</head>
<body>
    <div class="synth-panel">
        <h1>Minimoog v4 Auto-Patch</h1>
        
        <div class="screen">
            <h2>{{ preset.nombre }}</h2>
            <div class="parameter"><span class="label">OSCILADORES:</span> {{ preset.osciladores }}</div>
            <div class="parameter"><span class="label">FILTRO:</span> {{ preset.filtro }}</div>
            <div class="parameter"><span class="label">MODULACIÓN:</span> {{ preset.modulacion }}</div>
            <div class="note">/// {{ preset.nota }}</div>
        </div>
        
        <div class="button-container">
            <button onclick="window.location.reload()">Generar Patch</button>
        </div>
    </div>
</body>
</html>
