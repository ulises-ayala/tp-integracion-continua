<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Setlist</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 600px;
        }
        h1 {
            color: #00ff88;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.2rem;
            color: #bbbbbb;
        }
        .cancion {
            font-size: 1.8rem;
            font-weight: bold;
            margin: 30px 0;
            color: #ff0055;
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
        }
        button {
            background-color: #00ff88;
            color: #121212;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #00cc6a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Generador de Setlist 🎸</h1>
        <p>¿No sabés qué tocar en el próximo ensayo? El entorno de IC lo decide por vos:</p>
        
        <div class="cancion">
            {{ cancion }}
        </div>
        
        <button onclick="window.location.reload()">Generar otro tema</button>
    </div>
</body>
</html>
